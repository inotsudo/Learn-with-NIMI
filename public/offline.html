<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>NIMIPIKO — You're offline</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: system-ui, -apple-system, sans-serif;
    background: #F9FAFB;
    min-height: 100svh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 1.5rem;
    text-align: center;
    color: #111827;
  }
  .card {
    background: #fff;
    border-radius: 1.5rem;
    box-shadow: 0 8px 32px rgba(0,0,0,0.08);
    padding: 2.5rem 2rem;
    max-width: 24rem;
    width: 100%;
  }
  .emoji { font-size: 3.5rem; display: block; margin-bottom: 1rem; }
  h1 { font-size: 1.25rem; font-weight: 800; margin-bottom: 0.5rem; }
  p  { font-size: 0.875rem; color: #6B7280; line-height: 1.6; margin-bottom: 1.5rem; }
  .btn {
    display: inline-flex;
    align-items: center;
    gap: 0.5rem;
    background: #15803D;
    color: #fff;
    font-weight: 700;
    font-size: 0.875rem;
    border: none;
    border-radius: 0.875rem;
    padding: 0.65rem 1.5rem;
    cursor: pointer;
    text-decoration: none;
  }
  .hint {
    margin-top: 1.25rem;
    font-size: 0.75rem;
    color: #9CA3AF;
    line-height: 1.6;
  }
</style>
</head>
<body>
<div class="card">
  <span class="emoji">🌿</span>
  <h1>You're offline</h1>
  <p>Nimi can't reach the jungle right now. Check your connection and try again!</p>
  <button class="btn" onclick="window.location.reload()">
    🔄 Try again
  </button>
  <p class="hint">
    Stories you've already opened<br>are still available offline.
  </p>
</div>
</body>
</html>
