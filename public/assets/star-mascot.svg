<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120">
  <defs>
    <linearGradient id="starBody" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFE44D"/>
      <stop offset="30%" stop-color="#FFD700"/>
      <stop offset="70%" stop-color="#FFC107"/>
      <stop offset="100%" stop-color="#FF9800"/>
    </linearGradient>
    <linearGradient id="starShine" x1="0%" y1="0%" x2="50%" y2="50%">
      <stop offset="0%" stop-color="#FFFDE7" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#FFD700" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="cheekL" cx="50%" cy="50%">
      <stop offset="0%" stop-color="#FF6B6B" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#FF6B6B" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="cheekR" cx="50%" cy="50%">
      <stop offset="0%" stop-color="#FF6B6B" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#FF6B6B" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="innerShadow">
      <feGaussianBlur in="SourceAlpha" stdDeviation="2" result="blur"/>
      <feOffset dx="0" dy="2" result="offset"/>
      <feComposite in="SourceGraphic" in2="offset" operator="over"/>
    </filter>
  </defs>

  <!-- Outer glow -->
  <path d="M60 6 L72 40 L108 40 L78 60 L88 94 L60 76 L32 94 L42 60 L12 40 L48 40 Z"
    fill="#FFD700" opacity="0.2" filter="url(#glow)" transform="scale(1.08) translate(-4.8,-3.6)"/>

  <!-- Star body with shadow -->
  <path d="M60 10 L71 41 L104 41 L77 60 L86 92 L60 74 L34 92 L43 60 L16 41 L49 41 Z"
    fill="url(#starBody)" stroke="#E6A200" stroke-width="1.5" filter="url(#innerShadow)"/>

  <!-- Highlight on upper left -->
  <path d="M60 14 L68 38 L96 38 L74 52 L60 14Z" fill="url(#starShine)"/>

  <!-- Inner star detail line -->
  <path d="M60 26 L65 41 L80 41 L68 50 L72 66 L60 57 L48 66 L52 50 L40 41 L55 41Z"
    fill="none" stroke="#FFEB3B" stroke-width="0.5" opacity="0.3"/>

  <!-- Left arm -->
  <g transform="translate(-4, 2)">
    <path d="M32 56 Q22 50 16 42" fill="none" stroke="url(#starBody)" stroke-width="5" stroke-linecap="round"/>
    <!-- Hand -->
    <circle cx="15" cy="41" r="4.5" fill="#FFD700" stroke="#E6A200" stroke-width="1"/>
    <circle cx="13" cy="38" r="2" fill="#FFD700" stroke="#E6A200" stroke-width="0.8"/>
    <circle cx="16.5" cy="37" r="2" fill="#FFD700" stroke="#E6A200" stroke-width="0.8"/>
  </g>

  <!-- Right arm (waving) -->
  <g transform="translate(4, 2)">
    <path d="M88 56 Q96 46 102 36" fill="none" stroke="url(#starBody)" stroke-width="5" stroke-linecap="round"/>
    <!-- Hand -->
    <circle cx="103" cy="35" r="4.5" fill="#FFD700" stroke="#E6A200" stroke-width="1"/>
    <circle cx="101" cy="32" r="2" fill="#FFD700" stroke="#E6A200" stroke-width="0.8"/>
    <circle cx="105" cy="31.5" r="2" fill="#FFD700" stroke="#E6A200" stroke-width="0.8"/>
    <circle cx="107.5" cy="34" r="1.8" fill="#FFD700" stroke="#E6A200" stroke-width="0.8"/>
  </g>

  <!-- Left leg -->
  <path d="M48 80 Q44 92 40 100" fill="none" stroke="url(#starBody)" stroke-width="4.5" stroke-linecap="round"/>
  <ellipse cx="39" cy="102" rx="5" ry="3" fill="#FFD700" stroke="#E6A200" stroke-width="1"/>

  <!-- Right leg -->
  <path d="M72 80 Q76 92 80 100" fill="none" stroke="url(#starBody)" stroke-width="4.5" stroke-linecap="round"/>
  <ellipse cx="81" cy="102" rx="5" ry="3" fill="#FFD700" stroke="#E6A200" stroke-width="1"/>

  <!-- Face background (slightly lighter) -->
  <ellipse cx="60" cy="54" rx="16" ry="14" fill="#FFE082" opacity="0.3"/>

  <!-- Left eye -->
  <ellipse cx="50" cy="50" rx="7.5" ry="9" fill="white"/>
  <ellipse cx="52" cy="51" rx="5" ry="6.5" fill="#1a0a3e"/>
  <ellipse cx="53.5" cy="48.5" rx="2.5" ry="2.5" fill="white"/>
  <ellipse cx="50" cy="53" rx="1.2" ry="1" fill="white" opacity="0.5"/>

  <!-- Right eye -->
  <ellipse cx="70" cy="50" rx="7.5" ry="9" fill="white"/>
  <ellipse cx="68" cy="51" rx="5" ry="6.5" fill="#1a0a3e"/>
  <ellipse cx="69.5" cy="48.5" rx="2.5" ry="2.5" fill="white"/>
  <ellipse cx="66" cy="53" rx="1.2" ry="1" fill="white" opacity="0.5"/>

  <!-- Eyebrows -->
  <path d="M44 42 Q48 38 54 40" fill="none" stroke="#B8860B" stroke-width="2" stroke-linecap="round"/>
  <path d="M66 40 Q72 38 76 42" fill="none" stroke="#B8860B" stroke-width="2" stroke-linecap="round"/>

  <!-- Smile (wide happy) -->
  <path d="M46 62 Q52 72 60 72 Q68 72 74 62" fill="#B8860B" stroke="#8B6914" stroke-width="1"/>
  <path d="M48 62 Q54 70 60 70 Q66 70 72 62" fill="#FF7043" opacity="0.4"/>

  <!-- Tongue -->
  <ellipse cx="60" cy="68" rx="5" ry="3.5" fill="#EF5350" opacity="0.6"/>

  <!-- Cheeks -->
  <ellipse cx="38" cy="60" rx="7" ry="5" fill="url(#cheekL)"/>
  <ellipse cx="82" cy="60" rx="7" ry="5" fill="url(#cheekR)"/>

  <!-- Sparkles around -->
  <g fill="#FFF9C4" opacity="0.9">
    <path d="M10 18 L12 14 L14 18 L12 22Z"/>
    <path d="M10 18 L6 16 L10 14 L14 16Z" transform="translate(2,2)"/>
  </g>
  <g fill="#FFF9C4" opacity="0.8" transform="translate(94,8)">
    <path d="M0 4 L2 0 L4 4 L2 8Z"/>
    <path d="M0 4 L-4 2 L0 0 L4 2Z" transform="translate(2,2)"/>
  </g>
  <g fill="#FFF9C4" opacity="0.7" transform="translate(100,80)">
    <path d="M0 3 L1.5 0 L3 3 L1.5 6Z"/>
    <path d="M0 3 L-3 1.5 L0 0 L3 1.5Z" transform="translate(1.5,1.5)"/>
  </g>
  <g fill="#FFF9C4" opacity="0.6" transform="translate(6,88)">
    <path d="M0 3 L1.5 0 L3 3 L1.5 6Z"/>
    <path d="M0 3 L-3 1.5 L0 0 L3 1.5Z" transform="translate(1.5,1.5)"/>
  </g>

  <!-- Small floating stars -->
  <circle cx="22" cy="12" r="1.5" fill="#FFEB3B" opacity="0.7"/>
  <circle cx="100" cy="20" r="1" fill="#FFEB3B" opacity="0.6"/>
  <circle cx="8" cy="70" r="1.2" fill="#FFEB3B" opacity="0.5"/>
</svg>
