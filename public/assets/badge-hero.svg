      <stop offset="0%" stop-color="#64B5F6"/>
      <stop offset="40%" stop-color="#1E88E5"/>
      <stop offset="100%" stop-color="#0D47A1"/>
    </linearGradient>
    <linearGradient id="bhShine" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#E3F2FD" stop-opacity="0.6"/>
