<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 56 56">
  <defs>
    <linearGradient id="mBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#43A047"/>
      <stop offset="100%" stop-color="#1B5E20"/>
    </linearGradient>
    <linearGradient id="mShine" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#A5D6A7" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="transparent"/>
    </linearGradient>
  </defs>
  <rect width="56" height="56" rx="14" fill="url(#mBg)"/>
  <rect width="56" height="28" rx="14" fill="url(#mShine)"/>
  <!-- Head -->
  <circle cx="28" cy="12" r="6" fill="white"/>
  <circle cx="26" cy="11" r="1.2" fill="#1B5E20"/>
  <circle cx="30" cy="11" r="1.2" fill="#1B5E20"/>
  <path d="M26 14 Q28 16 30 14" fill="none" stroke="#1B5E20" stroke-width="0.8" stroke-linecap="round"/>
  <!-- Body -->
  <line x1="28" y1="18" x2="28" y2="30" stroke="white" stroke-width="3.5" stroke-linecap="round"/>
  <!-- Arms up celebrating -->
  <path d="M28 22 Q20 16 14 10" fill="none" stroke="white" stroke-width="3.5" stroke-linecap="round"/>
  <path d="M28 22 Q36 16 42 10" fill="none" stroke="white" stroke-width="3.5" stroke-linecap="round"/>
  <!-- Hands -->
  <circle cx="13" cy="9" r="3" fill="white"/>
  <circle cx="43" cy="9" r="3" fill="white"/>
  <!-- Legs dynamic pose -->
  <path d="M28 30 Q22 38 16 44" fill="none" stroke="white" stroke-width="3.5" stroke-linecap="round"/>
  <path d="M28 30 Q34 38 40 44" fill="none" stroke="white" stroke-width="3.5" stroke-linecap="round"/>
  <!-- Feet -->
  <ellipse cx="15" cy="45.5" rx="4" ry="2.5" fill="white"/>
  <ellipse cx="41" cy="45.5" rx="4" ry="2.5" fill="white"/>
  <!-- Motion lines -->
  <line x1="8" y1="14" x2="5" y2="12" stroke="#A5D6A7" stroke-width="1.5" stroke-linecap="round" opacity="0.7"/>
  <line x1="8" y1="18" x2="4" y2="18" stroke="#A5D6A7" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>
  <line x1="48" y1="14" x2="51" y2="12" stroke="#A5D6A7" stroke-width="1.5" stroke-linecap="round" opacity="0.7"/>
  <line x1="48" y1="18" x2="52" y2="18" stroke="#A5D6A7" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>
  <!-- Sparkle stars -->
  <circle cx="10" cy="6" r="1.5" fill="#FFF9C4" opacity="0.8"/>
  <circle cx="46" cy="6" r="1.5" fill="#FFF9C4" opacity="0.8"/>
  <circle cx="28" cy="50" r="1" fill="#FFF9C4" opacity="0.5"/>
</svg>
