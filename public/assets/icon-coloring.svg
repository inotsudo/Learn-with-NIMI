<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 56 56">
  <defs>
    <linearGradient id="cBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FB8C00"/>
      <stop offset="100%" stop-color="#E65100"/>
    </linearGradient>
    <linearGradient id="cShine" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFCC80" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="transparent"/>
    </linearGradient>
  </defs>
  <rect width="56" height="56" rx="14" fill="url(#cBg)"/>
  <rect width="56" height="28" rx="14" fill="url(#cShine)"/>
  <!-- Palette -->
  <ellipse cx="26" cy="30" rx="16" ry="14" fill="white"/>
  <ellipse cx="26" cy="30" rx="14" ry="12" fill="#FFF8E1" opacity="0.5"/>
  <!-- Paint blobs -->
  <circle cx="18" cy="24" r="4" fill="#E91E63"/>
  <circle cx="18" cy="24" r="2" fill="#F48FB1" opacity="0.4"/>
  <circle cx="27" cy="19" r="3.5" fill="#2196F3"/>
  <circle cx="27" cy="19" r="1.5" fill="#90CAF9" opacity="0.4"/>
  <circle cx="34" cy="24" r="3.5" fill="#4CAF50"/>
  <circle cx="34" cy="24" r="1.5" fill="#A5D6A7" opacity="0.4"/>
  <circle cx="32" cy="34" r="3" fill="#FF9800"/>
  <circle cx="20" cy="35" r="3.5" fill="#9C27B0"/>
  <!-- Thumb hole -->
  <ellipse cx="26" cy="38" rx="3.5" ry="3" fill="#FB8C00"/>
  <!-- Brush -->
  <rect x="36" y="8" width="4.5" height="20" rx="2.2" fill="#8D6E63" transform="rotate(20 38 18)"/>
  <rect x="37" y="7" width="4" height="5" rx="2" fill="#795548" transform="rotate(20 39 9.5)"/>
  <rect x="37.5" y="4" width="3.5" height="6" rx="1.5" fill="#E91E63" transform="rotate(20 39 7)"/>
  <rect x="38.5" y="5" width="1.5" height="4" rx="0.75" fill="#F48FB1" opacity="0.5" transform="rotate(20 39 7)"/>
  <!-- Paint drip -->
  <ellipse cx="40" cy="42" r="2.5" ry="3" fill="#E91E63" opacity="0.6"/>
</svg>
