<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 130">
  <defs>
    <linearGradient id="cupGold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFE44D"/>
      <stop offset="25%" stop-color="#FFD700"/>
      <stop offset="60%" stop-color="#FFC107"/>
      <stop offset="100%" stop-color="#E6A200"/>
    </linearGradient>
    <linearGradient id="cupShine" x1="0%" y1="0%" x2="60%" y2="60%">
      <stop offset="0%" stop-color="#FFFDE7" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#FFD700" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="leafG" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#81C784"/>
      <stop offset="100%" stop-color="#2E7D32"/>
    </linearGradient>
    <linearGradient id="leafGLight" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#A5D6A7" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#2E7D32" stop-opacity="0"/>
    </linearGradient>
    <filter id="tGlow">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Outer glow -->
  <ellipse cx="60" cy="55" rx="48" ry="44" fill="#FFD700" opacity="0.1" filter="url(#tGlow)"/>

  <!-- Left leaves -->
  <ellipse cx="20" cy="82" rx="16" ry="5.5" transform="rotate(-40 20 82)" fill="url(#leafG)"/>
  <ellipse cx="20" cy="82" rx="14" ry="4" transform="rotate(-40 20 82)" fill="url(#leafGLight)"/>
  <line x1="14" y1="86" x2="26" y2="78" stroke="#1B5E20" stroke-width="0.6" opacity="0.4" transform="rotate(-40 20 82)"/>
  <ellipse cx="16" cy="72" rx="13" ry="4.5" transform="rotate(-55 16 72)" fill="url(#leafG)" opacity="0.9"/>
  <ellipse cx="24" cy="90" rx="12" ry="4" transform="rotate(-25 24 90)" fill="url(#leafG)" opacity="0.8"/>

  <!-- Right leaves -->
  <ellipse cx="100" cy="82" rx="16" ry="5.5" transform="rotate(40 100 82)" fill="url(#leafG)"/>
  <ellipse cx="100" cy="82" rx="14" ry="4" transform="rotate(40 100 82)" fill="url(#leafGLight)"/>
  <ellipse cx="104" cy="72" rx="13" ry="4.5" transform="rotate(55 104 72)" fill="url(#leafG)" opacity="0.9"/>
  <ellipse cx="96" cy="90" rx="12" ry="4" transform="rotate(25 96 90)" fill="url(#leafG)" opacity="0.8"/>

  <!-- Base platform -->
  <rect x="38" y="108" width="44" height="9" rx="4.5" fill="#B8860B"/>
  <rect x="40" y="108" width="40" height="4" rx="2" fill="#DAA520"/>
  <rect x="33" y="115" width="54" height="8" rx="4" fill="#8B6914"/>
  <rect x="35" y="115" width="50" height="4" rx="2" fill="#A07818"/>

  <!-- Stem -->
  <rect x="53" y="88" width="14" height="22" rx="4" fill="url(#cupGold)"/>
  <rect x="55" y="88" width="5" height="20" rx="2.5" fill="url(#cupShine)"/>

  <!-- Cup body -->
  <path d="M28 22 Q28 82 60 86 Q92 82 92 22 Z" fill="url(#cupGold)" stroke="#DAA520" stroke-width="1.5"/>

  <!-- Cup rim -->
  <ellipse cx="60" cy="22" rx="32" ry="7" fill="#FFE082"/>
  <ellipse cx="60" cy="22" rx="29" ry="5" fill="url(#cupGold)"/>
  <ellipse cx="60" cy="21" rx="26" ry="3.5" fill="#FFE082" opacity="0.3"/>

  <!-- Left handle -->
  <path d="M28 34 Q8 34 8 54 Q8 72 28 72" fill="none" stroke="url(#cupGold)" stroke-width="8" stroke-linecap="round"/>
  <path d="M28 37 Q12 37 12 54 Q12 69 28 69" fill="none" stroke="#FFE082" stroke-width="3.5" stroke-linecap="round"/>

  <!-- Right handle -->
  <path d="M92 34 Q112 34 112 54 Q112 72 92 72" fill="none" stroke="url(#cupGold)" stroke-width="8" stroke-linecap="round"/>
  <path d="M92 37 Q108 37 108 54 Q108 69 92 69" fill="none" stroke="#FFE082" stroke-width="3.5" stroke-linecap="round"/>

  <!-- Shine streak -->
  <path d="M40 28 Q40 68 56 78 Q44 68 43 28Z" fill="url(#cupShine)"/>

  <!-- Face — left eye -->
  <ellipse cx="48" cy="50" rx="6" ry="7" fill="white"/>
  <ellipse cx="49.5" cy="51" rx="4" ry="5" fill="#1a0a3e"/>
  <ellipse cx="50.5" cy="49" rx="2" ry="2" fill="white"/>

  <!-- Face — right eye -->
  <ellipse cx="72" cy="50" rx="6" ry="7" fill="white"/>
  <ellipse cx="70.5" cy="51" rx="4" ry="5" fill="#1a0a3e"/>
  <ellipse cx="71.5" cy="49" rx="2" ry="2" fill="white"/>

  <!-- Eyebrows -->
  <path d="M42 42 Q46 38 52 40" fill="none" stroke="#B8860B" stroke-width="1.8" stroke-linecap="round"/>
  <path d="M68 40 Q74 38 78 42" fill="none" stroke="#B8860B" stroke-width="1.8" stroke-linecap="round"/>

  <!-- Smile -->
  <path d="M45 60 Q52 70 60 70 Q68 70 75 60" fill="#E6A200"/>
  <path d="M47 60 Q54 68 60 68 Q66 68 73 60" fill="#FF8F00" opacity="0.5"/>
  <ellipse cx="60" cy="66" rx="4" ry="2.5" fill="#EF5350" opacity="0.5"/>

  <!-- Cheeks -->
  <ellipse cx="38" cy="58" rx="5" ry="3.5" fill="#FF6B6B" opacity="0.35"/>
  <ellipse cx="82" cy="58" rx="5" ry="3.5" fill="#FF6B6B" opacity="0.35"/>

  <!-- Star on cup -->
  <path d="M60 32 L63 39 L71 39 L65 44 L67 51 L60 47 L53 51 L55 44 L49 39 L57 39Z"
    fill="#FFFDE7" stroke="#FFD700" stroke-width="0.8" opacity="0.7"/>

  <!-- Sparkle crosses -->
  <g fill="#FFFDE7" filter="url(#tGlow)">
    <rect x="17" y="8" width="2" height="10" rx="1"/>
    <rect x="13" y="12" width="10" height="2" rx="1"/>
  </g>
  <g fill="#FFFDE7" filter="url(#tGlow)">
    <rect x="97" y="4" width="2" height="9" rx="1"/>
    <rect x="94" y="7.5" width="9" height="2" rx="1"/>
  </g>
  <g fill="#FFFDE7" opacity="0.7">
    <rect x="5" y="50" width="1.5" height="7" rx="0.75"/>
    <rect x="2.5" y="53" width="7" height="1.5" rx="0.75"/>
  </g>
  <g fill="#FFFDE7" opacity="0.7">
    <rect x="113" y="48" width="1.5" height="7" rx="0.75"/>
    <rect x="110.5" y="51" width="7" height="1.5" rx="0.75"/>
  </g>

  <!-- Floating dots -->
  <circle cx="24" cy="16" r="2" fill="#FFE44D" opacity="0.6"/>
  <circle cx="98" cy="14" r="1.5" fill="#FFE44D" opacity="0.5"/>
  <circle cx="10" cy="38" r="1.2" fill="#FFFDE7" opacity="0.4"/>
  <circle cx="112" cy="36" r="1.2" fill="#FFFDE7" opacity="0.4"/>
</svg>
