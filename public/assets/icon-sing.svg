<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 56 56">
  <defs>
    <linearGradient id="sBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#EC407A"/>
      <stop offset="100%" stop-color="#AD1457"/>
    </linearGradient>
    <linearGradient id="sShine" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F48FB1" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="transparent"/>
    </linearGradient>
  </defs>
  <rect width="56" height="56" rx="14" fill="url(#sBg)"/>
  <rect width="56" height="28" rx="14" fill="url(#sShine)"/>
  <!-- Microphone head -->
  <ellipse cx="28" cy="17" rx="9" ry="11" fill="white"/>
  <ellipse cx="28" cy="17" rx="7" ry="9" fill="#F8BBD0"/>
  <!-- Grid -->
  <line x1="21" y1="15" x2="35" y2="15" stroke="white" stroke-width="0.7" opacity="0.6"/>
  <line x1="21" y1="19" x2="35" y2="19" stroke="white" stroke-width="0.7" opacity="0.6"/>
  <line x1="28" y1="8" x2="28" y2="26" stroke="white" stroke-width="0.7" opacity="0.4"/>
  <!-- Shine -->
  <ellipse cx="24" cy="14" rx="3" ry="5" fill="white" opacity="0.3"/>
  <!-- Handle -->
  <rect x="25.5" y="28" width="5" height="14" rx="2.5" fill="white"/>
  <rect x="26.5" y="29" width="2" height="10" rx="1" fill="#F8BBD0" opacity="0.4"/>
  <!-- Base -->
  <ellipse cx="28" cy="43" rx="8" ry="3" fill="white" opacity="0.8"/>
  <ellipse cx="28" cy="43" rx="6" ry="2" fill="#F8BBD0" opacity="0.3"/>
  <!-- Music notes -->
  <g opacity="0.9">
    <circle cx="42" cy="12" r="2.8" fill="white"/>
    <line x1="44.8" y1="12" x2="44.8" y2="4" stroke="white" stroke-width="1.8"/>
    <path d="M44.8 4 Q48 3 47 6.5" fill="white"/>
  </g>
  <g opacity="0.6">
    <circle cx="12" cy="18" r="2.2" fill="white"/>
    <line x1="14.2" y1="18" x2="14.2" y2="11" stroke="white" stroke-width="1.3"/>
    <path d="M14.2 11 Q17 10 16 13" fill="white"/>
  </g>
  <g opacity="0.4">
    <circle cx="44" cy="30" r="1.8" fill="white"/>
    <line x1="45.8" y1="30" x2="45.8" y2="25" stroke="white" stroke-width="1"/>
  </g>
