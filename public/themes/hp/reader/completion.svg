<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 200">
  <!-- Radiating golden beams from center (8 directions) -->
  <g transform="translate(150,100)" opacity="0.32">
    <line x1="0" y1="0" x2="0" y2="-92" stroke="#FCD34D" stroke-width="2.5"/>
    <line x1="0" y1="0" x2="65" y2="-65" stroke="#FCD34D" stroke-width="2"/>
    <line x1="0" y1="0" x2="92" y2="0" stroke="#FCD34D" stroke-width="2.5"/>
    <line x1="0" y1="0" x2="65" y2="65" stroke="#FCD34D" stroke-width="2"/>
    <line x1="0" y1="0" x2="0" y2="92" stroke="#FCD34D" stroke-width="2.5"/>
    <line x1="0" y1="0" x2="-65" y2="65" stroke="#FCD34D" stroke-width="2"/>
    <line x1="0" y1="0" x2="-92" y2="0" stroke="#FCD34D" stroke-width="2.5"/>
    <line x1="0" y1="0" x2="-65" y2="-65" stroke="#FCD34D" stroke-width="2"/>
  </g>
  <!-- Central soft glow -->
  <circle cx="150" cy="100" r="35" fill="#FCD34D" opacity="0.12"/>
  <circle cx="150" cy="100" r="20" fill="#FCD34D" opacity="0.15"/>
  <!-- Central 9-point star -->
  <polygon points="150,72 153,88 168,88 156,97 161,112 150,104 139,112 144,97 132,88 147,88" fill="#FCD34D" opacity="0.5"/>
  <!-- Floating sparkle stars at various positions -->
  <text x="48" y="42" text-anchor="middle" font-family="serif" font-size="16" fill="#FCD34D" opacity="0.35">✦</text>
  <text x="252" y="52" text-anchor="middle" font-family="serif" font-size="11" fill="#D4A017" opacity="0.3">✦</text>
  <text x="78" y="172" text-anchor="middle" font-family="serif" font-size="9" fill="#D4A017" opacity="0.28">✦</text>
  <text x="222" y="168" text-anchor="middle" font-family="serif" font-size="13" fill="#FCD34D" opacity="0.32">✦</text>
  <text x="40" y="130" text-anchor="middle" font-family="serif" font-size="8" fill="#D4A017" opacity="0.22">✦</text>
  <text x="260" y="140" text-anchor="middle" font-family="serif" font-size="10" fill="#FCD34D" opacity="0.28">✦</text>
  <!-- Outer ring dots -->
  <circle cx="150" cy="10" r="3" fill="#FCD34D" opacity="0.2"/>
  <circle cx="150" cy="190" r="3" fill="#FCD34D" opacity="0.2"/>
  <circle cx="10" cy="100" r="3" fill="#FCD34D" opacity="0.2"/>
  <circle cx="290" cy="100" r="3" fill="#FCD34D" opacity="0.2"/>
</svg>
