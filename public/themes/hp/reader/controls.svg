<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 60 60">
  <defs>
    <radialGradient id="brass" cx="38%" cy="32%" r="70%" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#FCD34D"/>
      <stop offset="45%" stop-color="#D4A017"/>
      <stop offset="100%" stop-color="#78350F"/>
    </radialGradient>
    <radialGradient id="shine" cx="35%" cy="25%" r="28%" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="white" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <!-- Brass disc -->
  <circle cx="30" cy="30" r="29" fill="url(#brass)"/>
  <circle cx="30" cy="30" r="29" fill="url(#shine)"/>
  <!-- Concentric ring details -->
  <circle cx="30" cy="30" r="25" fill="none" stroke="#FCD34D" stroke-width="1" opacity="0.5"/>
  <circle cx="30" cy="30" r="20" fill="none" stroke="#D4A017" stroke-width="0.8" opacity="0.4"/>
  <circle cx="30" cy="30" r="13" fill="none" stroke="#92400E" stroke-width="0.6" opacity="0.35"/>
  <circle cx="30" cy="30" r="5" fill="#92400E" opacity="0.25"/>
  <!-- Cardinal screw dots -->
  <circle cx="30" cy="3" r="2.5" fill="#D4A017" opacity="0.7"/>
  <circle cx="30" cy="57" r="2.5" fill="#D4A017" opacity="0.7"/>
  <circle cx="3" cy="30" r="2.5" fill="#D4A017" opacity="0.7"/>
  <circle cx="57" cy="30" r="2.5" fill="#D4A017" opacity="0.7"/>
  <!-- Diagonal knurling lines -->
  <line x1="10" y1="10" x2="15" y2="15" stroke="#FCD34D" stroke-width="0.6" opacity="0.3"/>
  <line x1="50" y1="10" x2="45" y2="15" stroke="#FCD34D" stroke-width="0.6" opacity="0.3"/>
  <line x1="10" y1="50" x2="15" y2="45" stroke="#FCD34D" stroke-width="0.6" opacity="0.3"/>
  <line x1="50" y1="50" x2="45" y2="45" stroke="#FCD34D" stroke-width="0.6" opacity="0.3"/>
</svg>
