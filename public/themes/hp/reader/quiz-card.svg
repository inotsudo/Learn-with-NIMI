<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 200">
  <!-- Main parchment border (slightly thicker, aged) -->
  <rect x="2" y="2" width="296" height="196" rx="4" fill="none" stroke="#92400E" stroke-width="2.5" opacity="0.7"/>
  <!-- Inner double-rule border -->
  <rect x="9" y="9" width="282" height="182" rx="2" fill="none" stroke="#D4A017" stroke-width="0.8" opacity="0.3"/>
  <!-- Header divider rule -->
  <line x1="18" y1="38" x2="282" y2="38" stroke="#D4A017" stroke-width="1.2" opacity="0.45"/>
  <line x1="18" y1="41" x2="282" y2="41" stroke="#D4A017" stroke-width="0.4" opacity="0.2"/>
  <!-- Wax seal bottom-right -->
  <circle cx="265" cy="165" r="22" fill="#B91C1C" opacity="0.45"/>
  <circle cx="265" cy="165" r="16" fill="none" stroke="#D4A017" stroke-width="1.2" opacity="0.5"/>
  <text x="265" y="170" text-anchor="middle" font-family="serif" font-size="14" fill="#FCD34D" opacity="0.65">✦</text>
  <!-- TL corner accent -->
  <path d="M2,32 L2,2 L32,2" fill="none" stroke="#D4A017" stroke-width="2.2" stroke-linecap="round" opacity="0.65"/>
  <!-- TR corner accent -->
  <path d="M298,32 L298,2 L268,2" fill="none" stroke="#D4A017" stroke-width="2.2" stroke-linecap="round" opacity="0.65"/>
  <!-- Ruled "answer lines" -->
  <line x1="22" y1="75" x2="200" y2="75" stroke="#92400E" stroke-width="0.7" opacity="0.22"/>
  <line x1="22" y1="98" x2="220" y2="98" stroke="#92400E" stroke-width="0.7" opacity="0.22"/>
  <line x1="22" y1="121" x2="190" y2="121" stroke="#92400E" stroke-width="0.7" opacity="0.22"/>
  <line x1="22" y1="144" x2="210" y2="144" stroke="#92400E" stroke-width="0.7" opacity="0.22"/>
  <!-- Top label -->
  <text x="150" y="24" text-anchor="middle" font-family="serif" font-size="10" fill="#D4A017" opacity="0.6" letter-spacing="2">WIZARD EXAMINATION</text>
</svg>
