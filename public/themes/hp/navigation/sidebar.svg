<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 800">
  <defs>
    <linearGradient id="wood" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#FEF3C7"/>
      <stop offset="35%"  stop-color="#FDE68A"/>
      <stop offset="65%"  stop-color="#FDE68A"/>
      <stop offset="100%" stop-color="#FEF3C7"/>
    </linearGradient>
    <radialGradient id="topGlow" cx="50%" cy="0%" r="60%">
      <stop offset="0%"   stop-color="#F59E0B" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#F59E0B" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="200" height="800" fill="url(#wood)"/>
  <rect width="200" height="800" fill="url(#topGlow)"/>
  <!-- Vertical grain lines (carved wood) -->
  <line x1="28"  y1="0" x2="30"  y2="800" stroke="#92400E" stroke-width="0.6" opacity="0.12"/>
  <line x1="78"  y1="0" x2="76"  y2="800" stroke="#92400E" stroke-width="0.4" opacity="0.08"/>
  <line x1="128" y1="0" x2="130" y2="800" stroke="#92400E" stroke-width="0.5" opacity="0.10"/>
  <line x1="168" y1="0" x2="166" y2="800" stroke="#92400E" stroke-width="0.3" opacity="0.07"/>
  <!-- Right edge gold trim -->
  <rect x="196" y="0" width="4" height="800" fill="#D4A017" opacity="0.18"/>
  <rect x="195" y="0" width="1" height="800" fill="#D4A017" opacity="0.08"/>
</svg>
