<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800">
  <defs>
    <linearGradient id="deep" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#E0F7FA"/>
      <stop offset="55%"  stop-color="#B3E5FC"/>
      <stop offset="100%" stop-color="#E0F2FE"/>
    </linearGradient>
    <radialGradient id="sunray" cx="72%" cy="0%" r="55%">
      <stop offset="0%"   stop-color="#ffffff" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="coralGlow" cx="50%" cy="100%" r="50%">
      <stop offset="0%"   stop-color="#0e7490" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#0e7490" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1200" height="800" fill="url(#deep)"/>
  <rect width="1200" height="800" fill="url(#sunray)"/>
  <rect width="1200" height="800" fill="url(#coralGlow)"/>
  <!-- Coral reef silhouettes — very faint at bottom -->
  <ellipse cx="160"  cy="800" rx="140" ry="90"  fill="#0e7490" opacity="0.05"/>
  <ellipse cx="300"  cy="800" rx="90"  ry="70"  fill="#0e7490" opacity="0.04"/>
  <ellipse cx="1040" cy="800" rx="140" ry="90"  fill="#0e7490" opacity="0.05"/>
  <ellipse cx="900"  cy="800" rx="90"  ry="70"  fill="#0e7490" opacity="0.04"/>
  <!-- Ambient bubble field -->
  <circle cx="200"  cy="550" r="9"  fill="none" stroke="#0ea5e9" stroke-width="0.8" opacity="0.08"/>
  <circle cx="600"  cy="300" r="6"  fill="none" stroke="#0ea5e9" stroke-width="0.8" opacity="0.10"/>
  <circle cx="900"  cy="450" r="8"  fill="none" stroke="#0ea5e9" stroke-width="0.8" opacity="0.08"/>
  <circle cx="1100" cy="200" r="5"  fill="none" stroke="#0ea5e9" stroke-width="0.7" opacity="0.10"/>
  <circle cx="400"  cy="650" r="12" fill="none" stroke="#0ea5e9" stroke-width="0.8" opacity="0.07"/>
  <!-- Light ray beams from top-right -->
  <polygon points="864,0 878,800 902,800 888,0"  fill="#bae6fd" opacity="0.035"/>
  <polygon points="910,0 924,800 948,800 934,0"  fill="#bae6fd" opacity="0.028"/>
</svg>
