<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <!-- Ripple rings from center -->
  <circle cx="100" cy="100" r="20" fill="none" stroke="#7DD3FC" stroke-width="1.5" opacity="0.4"/>
  <circle cx="100" cy="100" r="45" fill="none" stroke="#0EA5E9" stroke-width="1" opacity="0.3"/>
  <circle cx="100" cy="100" r="70" fill="none" stroke="#7DD3FC" stroke-width="0.8" opacity="0.25"/>
  <circle cx="100" cy="100" r="95" fill="none" stroke="#BAE6FD" stroke-width="0.5" opacity="0.2"/>
  <!-- Radiating bubble particles -->
  <circle cx="100" cy="20" r="4.5" fill="#7DD3FC" opacity="0.65"/>
  <circle cx="100" cy="180" r="3.5" fill="#7DD3FC" opacity="0.5"/>
  <circle cx="20" cy="100" r="3.5" fill="#7DD3FC" opacity="0.5"/>
  <circle cx="180" cy="100" r="3.5" fill="#7DD3FC" opacity="0.5"/>
  <circle cx="47" cy="47" r="4" fill="#0EA5E9" opacity="0.55"/>
  <circle cx="153" cy="47" r="4" fill="#0EA5E9" opacity="0.55"/>
  <circle cx="47" cy="153" r="3.5" fill="#0EA5E9" opacity="0.5"/>
  <circle cx="153" cy="153" r="3.5" fill="#0EA5E9" opacity="0.5"/>
  <!-- Scattered smaller bubbles -->
  <circle cx="65" cy="25" r="2.5" fill="#BAE6FD" opacity="0.5"/>
  <circle cx="135" cy="25" r="2.5" fill="#BAE6FD" opacity="0.5"/>
  <circle cx="175" cy="65" r="2.5" fill="#BAE6FD" opacity="0.45"/>
  <circle cx="25" cy="65" r="2.5" fill="#BAE6FD" opacity="0.45"/>
  <circle cx="175" cy="135" r="2" fill="#BAE6FD" opacity="0.4"/>
  <circle cx="25" cy="135" r="2" fill="#BAE6FD" opacity="0.4"/>
  <!-- Central glow -->
  <circle cx="100" cy="100" r="8" fill="#E0F9FF" opacity="0.5"/>
</svg>
