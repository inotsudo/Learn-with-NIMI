<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 56">
  <defs>
    <linearGradient id="glass" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#E0F7FA"/>
      <stop offset="100%" stop-color="#B3E5FC"/>
    </linearGradient>
    <radialGradient id="ray" cx="68%" cy="0%" r="45%">
      <stop offset="0%"   stop-color="#ffffff" stop-opacity="0.42"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1200" height="56" fill="url(#glass)"/>
  <rect width="1200" height="56" fill="url(#ray)"/>
  <!-- Bottom sea-glass border -->
  <line x1="0" y1="54" x2="1200" y2="54" stroke="#7dd3fc" stroke-width="1.2" opacity="0.28"/>
  <!-- Ambient bubbles -->
  <circle cx="380"  cy="20" r="3.5" fill="none" stroke="#0ea5e9" stroke-width="0.6" opacity="0.20"/>
  <circle cx="780"  cy="32" r="2.5" fill="none" stroke="#0ea5e9" stroke-width="0.6" opacity="0.18"/>
  <circle cx="1050" cy="16" r="4"   fill="none" stroke="#0ea5e9" stroke-width="0.6" opacity="0.16"/>
</svg>
