<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 60 60">
  <defs>
    <radialGradient id="pearl" cx="38%" cy="32%" r="72%" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#E0F9FF"/>
      <stop offset="35%" stop-color="#BAE6FD"/>
      <stop offset="70%" stop-color="#0EA5E9"/>
      <stop offset="100%" stop-color="#0C4A6E"/>
    </radialGradient>
    <radialGradient id="shine" cx="32%" cy="24%" r="30%" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="white" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="bubble1" cx="65%" cy="30%" r="15%" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="white" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <!-- Pearl disc -->
  <circle cx="30" cy="30" r="29" fill="url(#pearl)"/>
  <circle cx="30" cy="30" r="29" fill="url(#shine)"/>
  <circle cx="30" cy="30" r="29" fill="url(#bubble1)"/>
  <!-- Concentric iridescent rings -->
  <circle cx="30" cy="30" r="25" fill="none" stroke="#BAE6FD" stroke-width="0.9" opacity="0.5"/>
  <circle cx="30" cy="30" r="19" fill="none" stroke="#7DD3FC" stroke-width="0.7" opacity="0.4"/>
  <circle cx="30" cy="30" r="12" fill="none" stroke="#0EA5E9" stroke-width="0.5" opacity="0.3"/>
  <!-- Bubble highlight spots -->
  <circle cx="40" cy="19" r="4.5" fill="white" opacity="0.22"/>
  <circle cx="44" cy="16" r="2.5" fill="white" opacity="0.18"/>
  <circle cx="18" cy="42" r="2" fill="white" opacity="0.12"/>
</svg>
