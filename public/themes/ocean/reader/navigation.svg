<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 64">
  <defs>
    <linearGradient id="ctab" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#38BDF8"/>
      <stop offset="60%" stop-color="#0284C7"/>
      <stop offset="100%" stop-color="#0C4A6E"/>
    </linearGradient>
  </defs>
  <!-- Coral tab body -->
  <rect x="4" y="0" width="32" height="50" rx="5" fill="url(#ctab)" opacity="0.9"/>
  <!-- Wave bottom notch -->
  <path d="M4,48 Q12,56 20,50 Q28,44 36,52 L36,64 L4,64Z" fill="#0C4A6E" opacity="0.7"/>
  <!-- Pearl accent circle -->
  <circle cx="20" cy="20" r="8" fill="#BAE6FD" opacity="0.45"/>
  <circle cx="20" cy="20" r="5" fill="#E0F9FF" opacity="0.55"/>
  <circle cx="20" cy="20" r="2.5" fill="white" opacity="0.6"/>
  <!-- Wave decoration lines -->
  <path d="M7,32 Q13.5,28 20,32 Q26.5,36 33,32" fill="none" stroke="#BAE6FD" stroke-width="0.9" opacity="0.45"/>
  <path d="M7,38 Q13.5,34 20,38 Q26.5,42 33,38" fill="none" stroke="#7DD3FC" stroke-width="0.6" opacity="0.3"/>
  <!-- Border -->
  <rect x="4" y="0" width="32" height="50" rx="5" fill="none" stroke="#7DD3FC" stroke-width="0.8" opacity="0.4"/>
</svg>
