  <circle cx="240" cy="6" r="3.5" fill="#BAE6FD" opacity="0.7"/>
  <circle cx="240" cy="6" r="1.5" fill="white" opacity="0.55"/>
  <circle cx="320" cy="6" r="3.5" fill="#7DD3FC" opacity="0.75"/>
